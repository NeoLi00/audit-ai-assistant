services:
  postgres:
    image: postgres:16-alpine
    container_name: audit-ai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-audit_ai}
      POSTGRES_USER: ${POSTGRES_USER:-audit_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-audit_ai_password}
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-audit_ai} -d ${POSTGRES_DB:-audit_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: audit-ai-redis
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: audit-ai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: audit-ai-qdrant
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  opensearch:
    image: opensearchproject/opensearch:2.18.0
    container_name: audit-ai-opensearch
    profiles: ["opensearch"]
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-AuditAiAdmin123!}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "19200:9200"
      - "19600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

volumes:
  postgres-data:
  redis-data:
  minio-data:
  qdrant-data:
  opensearch-data:

